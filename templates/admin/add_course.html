{% extends "admin/_admin_base.html" %}
{% block title %}Add Course — Ti10-Waves{% endblock %}
{% block admin_content %}
<div class="section-eyebrow">New Course</div>
<h3 class="mb-4">Add Course</h3>

<div class="card p-4" style="max-width: 700px;">
  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Course Title</label>
      <input type="text" name="title" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Course Description</label>
      <textarea name="description" class="form-control" rows="4"></textarea>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Category</label>
        <input type="text" name="category" class="form-control" placeholder="e.g. Programming">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Instructor Name</label>
        <input type="text" name="instructor" class="form-control">
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Duration</label>
        <input type="text" name="duration" class="form-control" placeholder="e.g. 6 hours">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Thumbnail</label>
        <input type="file" name="thumbnail" class="form-control" accept=".png,.jpg,.jpeg">
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Batch (Year)</label>
        <select name="batch_id" class="form-select">
          <option value="">Unassigned</option>
          {% for b in batches %}
            <option value="{{ b.id }}">{{ b.name }} (Year {{ b.year }})</option>
          {% endfor %}
        </select>
        {% if not batches %}<div class="form-text">No batches yet — <a href="{{ url_for('admin.add_batch') }}">create one</a>.</div>{% endif %}
      </div>
      <div class="col-md-6 mb-3 d-flex align-items-end">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="published" name="published">
          <label class="form-check-label" for="published">Publish immediately (release to students)</label>
        </div>
      </div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Create Course</button>
    <a href="{{ url_for('admin.courses') }}" class="btn btn-outline-primary">Cancel</a>
  </form>
</div>
{% endblock %}
