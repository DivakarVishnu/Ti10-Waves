{% extends "admin/_admin_base.html" %}
{% block title %}Edit Course — Ti10-Waves{% endblock %}
{% block admin_content %}
<div class="section-eyebrow">Editing</div>
<h3 class="mb-4">Edit Course: {{ course.title }}</h3>

<div class="card p-4" style="max-width: 700px;">
  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Course Title</label>
      <input type="text" name="title" class="form-control" value="{{ course.title }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course Description</label>
      <textarea name="description" class="form-control" rows="4">{{ course.description or '' }}</textarea>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Category</label>
        <input type="text" name="category" class="form-control" value="{{ course.category or '' }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Instructor Name</label>
        <input type="text" name="instructor" class="form-control" value="{{ course.instructor or '' }}">
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Duration</label>
        <input type="text" name="duration" class="form-control" value="{{ course.duration or '' }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Course Thumbnail</label>
        <input type="file" name="thumbnail" class="form-control" accept=".png,.jpg,.jpeg">
        {% if course.thumbnail %}<div class="form-text">Current file saved. Upload a new one to replace it.</div>{% endif %}
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Batch (Year)</label>
        <select name="batch_id" class="form-select">
          <option value="">Unassigned</option>
          {% for b in batches %}
            <option value="{{ b.id }}" {{ 'selected' if course.batch_id == b.id }}>{{ b.name }} (Year {{ b.year }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6 mb-3 d-flex align-items-end">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="published" name="published" {{ 'checked' if course.published }}>
          <label class="form-check-label" for="published">Published (visible to students)</label>
        </div>
      </div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Save Changes</button>
    <a href="{{ url_for('admin.manage_content', course_id=course.id) }}" class="btn btn-outline-primary">Manage Content</a>
    <a href="{{ url_for('admin.courses') }}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
