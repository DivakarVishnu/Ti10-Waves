{% extends "base.html" %}
{% block title %}Login — Ti10-Waves{% endblock %}
{% block content %}
<div class="container">
  <div class="auth-card">
    <h3 class="text-center mb-1">Welcome back</h3>
    <p class="text-center text-muted mb-4">Log in to continue learning</p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email / Username</label>
        <input type="text" name="identifier" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>
    <p class="text-center mt-4 mb-0">
      New student? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
